    <script>
        var varosokEsLeir = [ // API-BÓL MAJD LEKÉRJÜK EZT
            {
                varos: "Párizs",
                leirasa: "Párizs, úgy is szokták hivní hogy a szerelem városa. Az egyik legmeglátogatott város a földön, jó okal is az étel és a látványok az egyik legjobbak a földön!"
            },
            {
                varos: "Sanghaj",
                leirasa: "Sanghaj, Kína legnagyobb ipari városa, a Távol-Kelet egyik gazdasági központja, tartományi jogú város a kelet-kínai tengerpart középső részén, a Jangce torkolatvidékén, a folyam Huangpu nevű kis mellékfolyójának két partján."
            },
                        {
                varos: "Tokió",
                leirasa: "Tokió, Japán fővárosa, közigazgatási központja, a japán kormány és a császár székhelye. Egyike Japán 47 prefektúrájának, nem egyetlen városként kormányozzák. Hozzávetőlegesen 14 millió ember – az ország lakosságának 10%-a – él Tokióban."
            },
            {
                varos: "New York",
                leirasa: "New York az Amerikai Egyesült Államok New York államában fekvő város. Az ország legnépesebb, Amerika szuperkontinens harmadik legnépesebb települése, központja a New York-i agglomerációnak, amely a szuperkontinens legnagyobb várostömörülése, a világon pedig a nyolcadik."
            }
        ]
        var container = document.getElementById('varosok');
        window.onload = () => {
            for (let i = 0; i < varosokEsLeir.length; i += 2) {
                container.innerHTML += 
                `
                <div class="row gap-2">
                    <div class="card col col-lg-12">
                        <img src="img/${varosokEsLeir[i].varos}.jpg" class="card-img-top" alt="${varosokEsLeir[i].varos}" title="${varosokEsLeir[i].varos}">
                        <div class="card-body">
                            <h1 class="card-title">${varosokEsLeir[i].varos}</h1>
                            <p class="card-text">${varosokEsLeir[i].leirasa}</p>
                            <button class="btn btn-primary" onclick="VarosValasztas('${varosokEsLeir[i].varos}')">Válasz engem!</button>
                        </div>
                    </div>
                    <div class="card col col-lg-12">
                        <img src="img/${varosokEsLeir[i+1].varos}.jpg" class="card-img-top" alt="${varosokEsLeir[i+1].varos}" title="${varosokEsLeir[i+1].varos}">
                        <div class="card-body">
                            <h1 class="card-title">${varosokEsLeir[i+1].varos}</h1>
                            <p class="card-text">${varosokEsLeir[i+1].leirasa}</p>
                            <button class="btn btn-primary" onclick="VarosValasztas('${varosokEsLeir[i+1].varos}')">Válasz engem!</button>
                        </div>
                    </div>
                </div>
                `
            }
        } 
        function ProfilMenu(){
            document.getElementById("Menu").classList.add("Mutat");
        }
        window.onclick = function(e){
            if (!e.target.matches('.ProfilMenu-gomb')) {
                var menu = document.getElementById("Menu");
                if (menu.classList.contains("Mutat")) {
                    menu.classList.remove("Mutat")
                }
            }
        }
        function  VarosValasztas(varos){
            terv.VarosBa = varos;

            container.innerHTML = 
            `
            <div class="valasztott" style="background-image: url(img/${varos}.jpg);">
                <h1 class="card-title">Ahova megy: ${varos}</h1>
            </div>
            <div class="valaszt">
                <label for="honan">Honan:</label>
                <input name="honan" type="text">
                <button class="btn btn-primary">Elküld</button>
            </div>
            <div id="KocsiValasztas" class="valaszt">
                <button class="btn btn-primary" onclick="kocsiAdas()">Kocsi hozzá adása</button>
            </div>
            <div id="repuloJegyValasztas" class="valaszt">
                <button class="btn btn-primary" onclick="repuloJegyAdas()">Repülő jegy hozzá adása</button>
            </div>
            <div id="hotelValasztas" class="valaszt">
                <button class="btn btn-primary" onclick="hotelAdas()">Hotel adása</button>
            </div>
            <button class="btn btn-primary" type="submit">BEADÁS</button> 
            `
        }
        
        var terv = { // EZ KÜLDJÜK A SZERVERNEK POST-KÉNT (talán csinálunk egy view az egész tábláról ahol össze van kötve?)
            VarosBa: "",
            VarosTol: "",
            Kocsi: "", // az id-t fogjuk tárolni és api-ból kérdezük az autó tuladjonságait
            repuloJegyId: "",
            hotel: ""
        }
        function kocsiAdas(){ // API-BÓL kérünk a kocsiból listát amik a választott vározsban vannak végig megyünk rajta for-loppal aztán írjuk ki <tr>-n ként (carrental-ból veszük)
            var kocsi = document.getElementById("KocsiValasztas");
            kocsi.innerHTML =  // ha majd választható lesz akkor innen választod és be megy a váltózóba => táblába változoba
            `
            <table class="table table-striped-columns">
                <thead>
                    <tr>
                        <th scope="col">Id</th>
                        <th scope="col">Kocsi neve</th>
                        <th scope="col">Ár</th>
                        <th scope="col">Város</th>
                        <th scope="col">Elérhetőség</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th scope="row">1</th>
                        <td>Audi SC-21</td>
                        <td>20 000 FT/nap</td>
                        <td>Párizs</td>
                        <td>Igen</td>
                    </tr>
                    <tr>
                        <th scope="row">2</th>
                        <td>Opel model 25</td>
                        <td>35 000 FT/nap</td>
                        <td>Tokió</td>
                        <td>Nem</td>
                    </tr>
                </tbody>
            </table>
            `
        }
        function repuloJegyAdas(){ // Ugyanaz mint a kocsinál csak a repülő jegy (Arriving & Departing WHERE) táblán fog menni (airplane ticket)
            var kocsi = document.getElementById("repuloJegyValasztas");
            kocsi.innerHTML =  
            `
            <table class="table table-striped-columns">
                <thead>
                    <tr>
                        <th scope="col">Id</th>
                        <th scope="col">Honnan</th>
                        <th scope="col">Hová</th>
                        <th scope="col">Időpont</th>
                        <th scope="col">JegySzam</th>
                        <th scope="col">Airline</th>
                        <th scope="col">Ar</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th scope="row">1</th>
                        <td>Budapest</td>
                        <td>Párizs</td>
                        <td>2025.10.10 10:10</td>
                        <td>123456789</td>
                        <td>United AirLines</td>
                        <td>1 000 FT</td>
                    </tr>
                    <tr>
                        <th scope="row">2</th>
                        <td>Singapore</td>
                        <td>Sanghaj</td>
                        <td>2028.12.12 12:12</td>
                        <td>987654321</td>
                        <td>China AirLines</td>
                        <td>500 FT</td>
                    </tr>
                </tbody>
            </table>
            `
        }
        function hotelAdas(){ // Ugyanaz mint a kocsinál csak a Hotel (városok alapján WHERE) jegy táblán fog menni (airplane ticket)
            var kocsi = document.getElementById("hotelValasztas");
            kocsi.innerHTML =  
            `
            <table class="table table-striped-columns">
                <thead>
                    <tr>
                        <th scope="col">Id</th>
                        <th scope="col">Neve</th>
                        <th scope="col">Városa</th>
                        <th scope="col">Ár</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th scope="row">1</th>
                        <td>Hotel Transylvania</td>
                        <td>Párizs</td>
                        <td>120 000 FT</td>
                    </tr>
                    <tr>
                        <th scope="row">2</th>
                        <td>Hotel 2</td>
                        <td>Sanghaj</td>
                        <td>100 FT</td>
                    </tr>
                </tbody>
            </table>
            `
        }

    </script>
