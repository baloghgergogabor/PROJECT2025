        <script>
        function ProfilMenu(){
            document.getElementById("Menu").classList.add("Mutat");
        }
        window.onclick = function(e){
            if (!e.target.matches('.ProfilMenu-gomb')) {
                var menu = document.getElementById("Menu");
                if (menu.classList.contains("Mutat")) {
                    menu.classList.remove("Mutat")
                }
            }
        }
    </script>
