<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Az Út vonal tervező</title>
</head>
<body>
    <div class="navbar">
        <nav>
            <a href="tripPlanner.html">Út tervezés</a>
            <a href="Tervek.html">Terveim</a>
            <div class="ProfilMenu">
                <button class="ProfilMenu-gomb" onclick="ProfilMenu()"></button>
                <div id="Menu" class="ProfilMenu-Linkek">
                    <a href="Bejelentkezes.html">Bejelentkezes</a>
                    <a href="Regisztralas.html">Regisztrálás</a>
                    <a href="profil.html">Profilom</a>
                </div>
            </div>
        </nav>
    </div>
    <div class="center">
        <h1>Üdv</p>    
        <br>
        <h2>Az oldalról</h2>
        <p>
            Ez az oldal segít a vakáció terveidbe hogy ne leked kelljen folyamatosan kereskélni.
            hogy elkezdjed csak kattincs a gombra vagy a navbar-on keresztűl.
        </p>
        <br>
        <button class="Startbutton"><a href="tripPlanner.html">Kedzjűk el!</a></button>
        <br>
    </div>
    <script>
        function ProfilMenu(){
            document.getElementById("Menu").classList.add("Mutat");
        }
        window.onclick = function(e){
            if (!e.target.matches('.ProfilMenu-gomb')) {
                var menu = document.getElementById("Menu");
                if (menu.classList.contains("Mutat")) {
                    menu.classList.remove("Mutat")
                }
            }
        }
    </script>
</body>
</html>
